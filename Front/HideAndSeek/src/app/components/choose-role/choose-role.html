<div id="choose-role">
    <h1>⚓ Plunder Quest ⚓</h1>
    <p class="subtitle">Choose your crew to begin</p>
    <div id="roles">
        <button id="hider" (click)="chooseRole('hider')">Bury Treasure (Hider)</button>
        <button id="third" (click)="chooseRole('third')">Quartermaster (Third Person)</button>
        <button id="seeker" (click)="chooseRole('seeker')">Hunt Treasure (Seeker)</button>
    </div>
</div>
