<div class="page-container">
  <header class="page-header">

    <!-- HIDER SCOREBOARD -->
    <div class="score-panel">
      <div class="score-label"><h2>Treasures Hidden (Hider)</h2></div>
      <div class="score-value">
        <p class="points-text">{{ hiderScore | number:'1.0-2' }} pts</p>
        <span class="wins-text">🏴‍☠️ {{ hiderWins }} Wins</span>
      </div>
    </div>

    <!-- SEEKER SCOREBOARD -->
    <div class="score-panel">
      <div class="score-label"><h2>Treasures Found (Seeker)</h2></div>
      <div class="score-value">
        <p class="points-text">{{ seekerScore | number:'1.0-2' }} pts</p>
        <span class="wins-text">⚓ {{ seekerWins }} Wins</span>
      </div>
    </div>

  </header>

  <main class="board-area">
    <app-matrix-generator></app-matrix-generator>
  </main>

  <footer class="page-footer">
    <button class="btn-secondary btn-small" (click)="showSimplexTableau()">Captain's Log (Tableau)</button>
    <button class="btn-accent btn-small" (click)="resetGame()">New Voyage</button>
  </footer>
</div>
