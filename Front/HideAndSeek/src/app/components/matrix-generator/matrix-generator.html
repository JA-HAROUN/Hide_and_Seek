<div class="game-layout">

  <!-- LEFT SIDE: The Map and the Next Round Button -->
  <div class="board-column">

    <!-- 1. The Map -->
    <div class="matrix-container">
      @for (row of matrix; track $index; let rowIndex = $index) {
        <div class="matrix-row">
          @for (cell of row; track $index; let colIndex = $index) {
            <app-box
              [data]="cell"
              [role]="currentRole"
              [isFlipped]="isBoardFlipped"
              [isLocked]="isWaitingForSequence || roundOver"
              [speedMultiplier]="speedMultiplier"
              (boxClicked)="handleBoxClick(rowIndex, colIndex)">
            </app-box>
          }
        </div>
      }
    </div>

    <!-- 2. Next Round Button (Now safely tucked under the map!) -->
    @if (roundOver) {
      <div class="next-round-container fade-in">
        <button class="btn-primary action-btn" (click)="startNextRound()">
          Play Next Round 🏴‍☠️
        </button>
      </div>
    }

  </div>

  <!-- RIGHT SIDE: Quartermaster Controls -->
  @if (currentRole === 'third') {
    <div class="quartermaster-panel panel">
      <h2>📜 Captain's Log</h2>

      <div class="sim-controls">
        <button class="btn-primary" [disabled]="isSimulating" (click)="startVisualSimulation()">
          Start 100 Voyages
        </button>
        <button class="btn-secondary" [disabled]="!isSimulating" (click)="stopSimulation()">
          Halt
        </button>
      </div>

      <div class="speed-controls">
        <span>Speed: </span>
        <button [class.active]="speedMultiplier === 1" (click)="setSpeed(1)">1x</button>
        <button [class.active]="speedMultiplier === 2" (click)="setSpeed(2)">2x</button>
        <button [class.active]="speedMultiplier === 5" (click)="setSpeed(5)">5x</button>
      </div>

      <div class="sim-scoreboard">
        <p><strong>Voyage Progress:</strong> {{ simRound }} / 100</p>
      </div>

      <div class="sim-log">
        @for (entry of simLog; track $index) {
          <div class="log-entry fade-in">{{ entry }}</div>
        }
      </div>
    </div>
  }

</div>
